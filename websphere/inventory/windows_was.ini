[windows_was]
# WebSphere hosts in Windows
# Format: hostname ansible_host=IP ansible_user=admin_user

ws-app-server1 ansible_host=192.168.1.100 ansible_user=Administrator
ws-app-server2 ansible_host=192.168.1.101 ansible_user=Administrator
ws-app-server3 ansible_host=192.168.1.102 ansible_user=Administrator

[windows_was:vars]
# Default connection variables
ansible_connection=winrm
ansible_winrm_transport=basic
ansible_port=5985
# Use vault for passwords in production: ansible_password=vault_password
