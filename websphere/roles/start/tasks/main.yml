---
- name: Start WebSphere application server
  win_shell: |
    $wasPath = "{{ was_install_path }}"
    $profileName = "{{ was_profile_name }}"
    $serverName = "{{ was_server_name }}"
    $startScript = "$wasPath\profiles\$profileName\bin\startServer.bat"
    
    Write-Host "Starting WebSphere Application Server..."
    Write-Host "Profile: $profileName"
    Write-Host "Server: $serverName"
    
    if (Test-Path $startScript) {
      & $startScript $serverName
      Write-Host "Server startup command executed"
    } else {
      Write-Host "WARNING: Start script not found at $startScript"
    }
  environment:
    CATALINA_HOME: "{{ was_install_path }}"
  register: server_start
  timeout: "{{ startup_timeout }}"
  tags:
    - start

- name: Wait for server to start
  win_shell: |
    $adminPort = {{ was_admin_port }}
    $timeout = {{ startup_timeout }}
    $elapsed = 0
    $interval = 5
    
    Write-Host "Waiting for server to start on port $adminPort..."
    
    while ($elapsed -lt $timeout) {
      try {
        $connection = Test-NetConnection -ComputerName localhost -Port $adminPort -WarningAction SilentlyContinue
        if ($connection.TcpTestSucceeded) {
          Write-Host "Server is responding on port $adminPort"
          exit 0
        }
      } catch {
        # Port not ready yet
      }
      
      Start-Sleep -Seconds $interval
      $elapsed += $interval
      Write-Host "Waiting... ($elapsed/$timeout seconds)"
    }
    
    Write-Host "WARNING: Timeout waiting for server port"
  register: wait_for_server
  ignore_errors: true
  tags:
    - start

- name: Verify server is running
  win_service:
    name: "IBM WebSphere Application Server"
    state: started
  ignore_errors: true
  register: service_status
  tags:
    - start

- name: Check admin console availability
  win_shell: |
    $adminHost = "localhost"
    $adminPort = {{ was_admin_secure_port }}
    
    try {
      $response = Invoke-WebRequest -Uri "https://$adminHost:$adminPort/ibm/console" -SkipCertificateCheck -TimeoutSec 5 -ErrorAction Stop
      Write-Host "Admin Console is accessible"
      exit 0
    } catch {
      Write-Host "Admin Console check returned: $($_.Exception.Message)"
      exit 0  # Don't fail if console not accessible yet
    }
  register: console_check
  ignore_errors: true
  tags:
    - start

- name: Start phase summary
  debug:
    msg: |
      ✓ Server startup initiated: {{ server_start.rc | default('N/A') }}
      ✓ Port availability: {{ wait_for_server.rc | default('N/A') }}
      ✓ Service Status: {% if service_status.state is defined %}{{ service_status.state }}{% else %}Unknown{% endif %}
      
      Admin Console:
      - URL: https://localhost:{{ was_admin_secure_port }}/ibm/console
      - Port Check: {{ console_check.rc | default('N/A') }}
      
      Start Phase: COMPLETED
      
      Note: Verify server fully started before deploying applications
  tags:
    - start
