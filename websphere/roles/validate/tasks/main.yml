---
- name: Validate WAS installation
  win_shell: |
    $wasPath = "{{ was_install_path }}"
    
    if (Test-Path "$wasPath\bin\version.bat") {
      Write-Host "WAS Installation: VALID"
      exit 0
    } else {
      Write-Host "WAS Installation: INVALID"
      exit 1
    }
  register: was_validation
  failed_when: was_validation.rc != 0
  tags:
    - validate
    - test

- name: Verify profile exists
  win_shell: |
    $profilePath = "{{ was_profile_path }}\{{ was_profile_name }}"
    
    if (Test-Path $profilePath) {
      Write-Host "Profile found: {{ was_profile_name }}"
      Get-Item $profilePath | Select-Object FullName, LastWriteTime
    } else {
      Write-Host "ERROR: Profile not found at $profilePath"
      exit 1
    }
  register: profile_validation
  tags:
    - validate
    - test

- name: Check Java connectivity
  win_shell: |
    Write-Host "Verifying Java installation..."
    java -version 2>&1
  register: java_validation
  tags:
    - validate
    - test

- name: Verify port availability
  win_shell: |
    $ports = @({{ was_http_port }}, {{ was_https_port }}, {{ was_admin_port }}, {{ was_admin_secure_port }})
    
    foreach ($port in $ports) {
      try {
        $connection = Test-NetConnection -ComputerName localhost -Port $port -WarningAction SilentlyContinue
        if ($connection.TcpTestSucceeded) {
          Write-Host "Port $port: LISTENING"
        } else {
          Write-Host "Port $port: NOT LISTENING"
        }
      } catch {
        Write-Host "Port $port: Check failed - $($_.Exception.Message)"
      }
    }
  register: port_validation
  tags:
    - validate
    - test

- name: Disk space check
  win_shell: |
    $installDrive = "{{ was_install_path }}" -split "\\" | Select-Object -First 1
    $disk = Get-PSDrive $([char]($installDrive.TrimEnd(':').ToCharArray()[0])) | Select-Object -ExpandProperty Free
    $diskGB = [math]::Round($disk / 1GB, 2)
    
    Write-Host "Available disk space: ${diskGB}GB"
    
    if ($diskGB -lt 5) {
      Write-Host "WARNING: Low disk space detected"
    }
  register: disk_check
  tags:
    - validate
    - test

- name: Check event logs for errors
  win_shell: |
    $errors = Get-EventLog -LogName "Application" -InstanceId 1000 -ErrorAction SilentlyContinue | Select-Object -First 5
    
    if ($errors) {
      Write-Host "Recent application errors found:"
      $errors | ForEach-Object {
        Write-Host "  - $($_.Message | Select-Object -First 50)"
      }
    } else {
      Write-Host "No critical application errors found"
    }
  register: event_log_check
  ignore_errors: true
  tags:
    - validate
    - test

- name: Test admin console connectivity
  win_shell: |
    $adminHost = "localhost"
    $adminPort = {{ was_admin_secure_port }}
    
    Write-Host "Testing admin console connectivity..."
    Write-Host "URL: https://$adminHost:$adminPort/ibm/console"
    
    try {
      $response = Invoke-WebRequest -Uri "https://$adminHost:$adminPort/ibm/console" `
        -SkipCertificateCheck -TimeoutSec {{ validation_timeout }} -ErrorAction Stop
      
      if ($response.StatusCode -eq 200) {
        Write-Host "Admin console: ACCESSIBLE"
      }
    } catch {
      Write-Host "Admin console connectivity check: $($_.Exception.Message)"
    }
  register: console_connectivity
  ignore_errors: true
  tags:
    - validate
    - test

- name: Validation summary
  assert:
    that:
      - was_validation.rc == 0
      - profile_validation.rc == 0
      - java_validation.rc == 0
    fail_msg: "Critical validation checks failed"
  tags:
    - validate
    - test

- name: Display comprehensive validation report
  debug:
    msg: |
      ========================================
      VALIDATION REPORT - WEBSPHERE APPLICATION SERVER
      ========================================
      
      Timestamp: {{ ansible_date_time.iso8601 }}
      Target Host: {{ ansible_hostname }}
      
      Installation Details:
      - Installation Path: {{ was_install_path }}
      - Profile Name: {{ was_profile_name }}
      - Server Name: {{ was_server_name }}
      - Java Version: {{ java_version }}
      
      Validation Results:
      ✓ WAS Installation: VALID
      ✓ Profile: EXISTS
      ✓ Java: AVAILABLE
      ✓ Disk Space: {{ disk_check.stdout | trim }}
      
      Port Status:
      - HTTP ({{ was_http_port }}): Check results in logs
      - HTTPS ({{ was_https_port }}): Check results in logs
      - Admin ({{ was_admin_port }}): Check results in logs
      - Admin Secure ({{ was_admin_secure_port }}): Check results in logs
      
      Admin Console:
      - URL: https://{{ ansible_host }}:{{ was_admin_secure_port }}/ibm/console
      - Status: {{ console_connectivity.rc | default('Unable to check') }}
      
      ========================================
      VALIDATION STATUS: PASSED
      ========================================
  tags:
    - validate
    - test
