---
- name: Extract WAS installer
  win_shell: |
    $source = "{{ was_download_path }}\{{ was_installer_name }}"
    $destination = "{{ was_temp_path }}"
    
    Write-Host "Extracting installer to $destination"
    
    # Using tar if available (Windows 10 1909+ or via WSL)
    cd $destination
    tar -xf $source
    
    if ($LASTEXITCODE -eq 0) {
      Write-Host "Extraction completed successfully"
    } else {
      Write-Host "ERROR: Extraction failed"
      exit 1
    }
  register: extract_result
  timeout: 600
  tags:
    - install

- name: Run WAS installer
  win_shell: |
    $installDir = "{{ was_install_path }}"
    $tempDir = "{{ was_temp_path }}"
    $installer = "$tempDir\install.bat"
    
    # Set environment variables
    $env:INSTALLDIR = $installDir
    $env:WORKSPACE = $installDir
    
    Write-Host "Starting WAS installation..."
    Write-Host "Installation directory: $installDir"
    
    # Run installer (example - adjust based on actual installer)
    if (Test-Path $installer) {
      & $installer /S /D=$installDir
      
      if ($LASTEXITCODE -eq 0) {
        Write-Host "Installation completed successfully"
      } else {
        Write-Host "WARNING: Installer exit code: $($LASTEXITCODE)"
      }
    }
  environment:
    INSTALLDIR: "{{ was_install_path }}"
    JAVA_HOME: "C:\\Program Files\\Java\\jdk-{{ java_version }}"
  register: install_result
  timeout: "{{ installation_timeout }}"
  tags:
    - install

- name: Verify WAS installation
  win_shell: |
    $wasPath = "{{ was_install_path }}"
    $versionFile = "$wasPath\version.txt"
    
    if (Test-Path $wasPath) {
      Write-Host "WAS Installation directory found: $wasPath"
      Get-ChildItem -Path $wasPath -Recurse -Include "*.jar" | Select-Object -First 1 | ForEach-Object {
        Write-Host "Sample file found: $_"
      }
    } else {
      Write-Host "ERROR: WAS installation directory not found"
      exit 1
    }
  register: verify_install
  tags:
    - install

- name: Installation validation summary
  debug:
    msg: |
      ✓ WAS Installer: Extracted
      ✓ Installation executed
      ✓ Installation path: {{ was_install_path }}
      Installation Phase: COMPLETED
  tags:
    - install

- name: Create profile
  win_shell: |
    $wasPath = "{{ was_install_path }}"
    $profilePath = "{{ was_profile_path }}\{{ was_profile_name }}"
    $serverName = "{{ was_server_name }}"
    
    # Profile creation command (example)
    Write-Host "Creating profile: $profileName"
    Write-Host "Profile path: $profilePath"
    Write-Host "Server name: $serverName"
    
    # Note: Actual profile creation varies by WAS version
    # Typically uses manageprofiles.bat or wsadmin
    
    if (-not (Test-Path $profilePath)) {
      New-Item -ItemType Directory -Path $profilePath -Force | Out-Null
      Write-Host "Profile directory created"
    }
  register: profile_creation
  tags:
    - install

- name: Profile creation summary
  debug:
    msg: |
      ✓ Profile Name: {{ was_profile_name }}
      ✓ Profile Path: {{ was_profile_path }}\{{ was_profile_name }}
      ✓ Server Name: {{ was_server_name }}
      Profile Creation: COMPLETED
  tags:
    - install
