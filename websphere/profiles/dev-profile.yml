---
# Development Environment Profile for WebSphere Application Server
environment: dev
environment_tier: development

# WAS Version and Java
was_version: "9.0.5"
was_version_full: "IBM WebSphere Application Server 9.0.5"
java_version: "11"

# Installation paths
was_install_path: "C:\\IBM\\WebSphere\\AppServer"
was_profile_path: "{{ was_install_path }}\\profiles"
was_profile_name: "AppSrv01"
was_server_name: "server1"

# Installer details
was_download_url: "http://artifactory.internal/was/9.0.5/was9.0.5.tar"
was_installer_name: "was9.0.5.tar"
was_installer_checksum: "3d4f8e9b2c5a1d6e7f8g9h0i1j2k3l4m"  # Replace with actual

# JVM Settings
jvm_initial_heap: 512
jvm_max_heap: 1024
jvm_generic_jvm_args: "-Xgcpolicy:gencon -Duser.timezone=UTC"

# Port Configuration
was_http_port: 8080
was_https_port: 8443
was_admin_port: 9060
was_admin_secure_port: 9043
was_bootstrap_port: 7099

# Data Source (optional)
database_enabled: false
database_host: ""
database_port: ""
database_name: ""
database_user: ""

# Performance Settings
enable_connection_pooling: true
connection_pool_size: 20
thread_pool_size: 50

# Backup and Recovery
enable_backups: false
backup_path: ""

# Logging
log_level: DEBUG
enable_verbose_logging: true
log_file_size_mb: 50

# Security (Development - relaxed)
enable_ssl: false
enable_security_manager: false
admin_security_enabled: false

# Additional repositories/features
install_ihs: false  # Install IBM HTTP Server
install_plugin: false
install_express: true  # Use WAS Express for development
